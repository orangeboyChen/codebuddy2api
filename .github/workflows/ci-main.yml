name: Main Checks

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_CACHE_PATH: ~/.bun/install/cache
  BUN_VERSION: 1.3.14
  CI: true
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    name: Bun / TypeScript / Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.BUN_CACHE_PATH }}
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format:check

      - name: Run TypeScript type checks
        run: bun run typecheck

      - name: Run unit tests with coverage gate
        run: bun run test:ci

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codebuddy2api-main
          disable_search: true
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Build Next.js app
        run: bun run build

  docker-build:
    name: Docker Build
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=codebuddy2api-docker
          cache-to: type=gha,mode=max,scope=codebuddy2api-docker
          context: .
          file: Dockerfile
          push: false
          tags: codebuddy2api:ci-main
