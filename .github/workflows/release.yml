name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest_tag" ]]; then
            version="1.0.0"
          else
            current_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$current_version"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Latest tag '$latest_tag' is not in vX.Y.Z format." >&2
              exit 1
            fi

            version="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codebuddy2api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/codebuddy2api:latest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/codebuddy2api:${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Docker image: \`$IMAGE_NAME\`"
