name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  BUN_CACHE_PATH: ~/.bun/install/cache
  CI: true
  NEXT_TELEMETRY_DISABLED: '1'
  BUN_VERSION: 1.3.14

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      owner: ${{ steps.owner.outputs.owner }}
      image: ghcr.io/${{ steps.owner.outputs.owner }}/codebuddy2api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "$latest_tag" ]]; then
            version="1.0.0"
          else
            current_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$current_version"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Latest tag '$latest_tag' is not in vX.Y.Z format." >&2
              exit 1
            fi

            version="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Determine lowercase owner
        id: owner
        shell: bash
        run: |
          set -euo pipefail

          lower_owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner=$lower_owner" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Bun / TypeScript / Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.BUN_CACHE_PATH }}
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format:check

      - name: Run TypeScript type checks
        run: bun run typecheck

      - name: Run unit tests with coverage gate
        run: bun run test:coverage

      - name: Build Next.js app
        run: bun run build

  publish-image:
    needs:
      - prepare
      - verify
    name: Publish multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Detect Docker Hub credentials
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_PASSWORD}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Determine image tags
        id: tags
        shell: bash
        env:
          GHCR_IMAGE: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          set -euo pipefail

          tags=(
            "${GHCR_IMAGE}:${VERSION}"
            "${GHCR_IMAGE}:latest"
          )

          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_PASSWORD}" ]]; then
            tags+=(
              "docker.io/${DOCKERHUB_USERNAME}/codebuddy2api:${VERSION}"
              "docker.io/${DOCKERHUB_USERNAME}/codebuddy2api:latest"
            )
          fi

          {
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=codebuddy2api-docker
          cache-to: type=gha,mode=max,scope=codebuddy2api-docker
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  release:
    needs:
      - prepare
      - publish-image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          release_notes="Docker image: \`${IMAGE_NAME}\`"

          if [[ -n "${DOCKERHUB_USERNAME}" ]]; then
            release_notes="${release_notes}"$'\n'"Docker Hub image: \`docker.io/${DOCKERHUB_USERNAME}/codebuddy2api:${RELEASE_TITLE}\`"
          fi

          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --latest \
            --notes "$release_notes"
